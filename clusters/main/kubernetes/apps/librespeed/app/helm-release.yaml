---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: librespeed
  namespace: librespeed
spec:
  interval: 15m
  chart:
    spec:
      chart: librespeed
      version: 18.0.1
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 15m
  timeout: 20m
  maxHistory: 3
  driftDetection:
    mode: warn
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    gatus:
      group: test
    global:
      stopAll: false
    # ingress:
    #   main:
    #     enabled: true
    #     ingressClassName: internal
    #     hosts:
    #       - host: librespeed.${BASE_DOMAIN}
    #     integrations:
    #       certManager:
    #         enabled: true
    #         certificateIssuer: cloudflare

    route:
      main:
        # -- Enables or disables the route
        enabled: true
        # -- Set the route kind
        # Valid options are GRPCRoute, HTTPRoute, TCPRoute, TLSRoute, UDPRoute
        kind: HTTPRoute
        # -- Provide additional annotations which may be required.
        annotations: {}
          ## Dit gaat dus niet, kan enkel op de gateway. Moet ook worden geactiveerd in Certmanager zelf.
          ## https://cert-manager.io/docs/usage/gateway/
          # cert-manager.io/cluster-issuer: cloudflare
          # cert-manager.io/private-key-rotation-policy: Always
        labels: {}
        # -- Configure the resource the route attaches to.
        parentRefs:
          - group: gateway.networking.k8s.io
            kind: Gateway
            name: envoy-internal
            namespace: envoy-gateway
            sectionName: https
        # -- Host addresses
        hostnames: 
          - librespeed.${DOMAIN_2}
        # -- Configure rules for routing. Defaults to the primary service.
        rules:
          - backendRefs:
              - group: ""
                kind: Service
                name:
                namespace:
                port:
                weight: 1
            ## Configure conditions used for matching incoming requests. Only for HTTPRoutes
            matches:
              - path:
                  type: PathPrefix
                  value: /

    resources:
      requests:
        cpu: 10m
