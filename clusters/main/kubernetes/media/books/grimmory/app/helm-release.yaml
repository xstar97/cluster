---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grimmory
  namespace: grimmory
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 18.3.0
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 30m
  timeout: 20m
  maxHistory: 3
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    gatus:
      group: media-books
    global:
      stopAll: false
    image:
      pullPolicy: IfNotPresent
      repository: ghcr.io/grimmory-tools/grimmory
      tag: v3.0.2@sha256:4557a78321add7d70bef7c0b89c2617c8c023246ae39698bc2cbe636f8c97f9b
    securityContext:
      container:
        readOnlyRootFilesystem: false
        runAsNonRoot: false
        runAsUser: 0
        runAsGroup: 0
    credentials:
      cf-restic:
        type: s3
        url: "${CF_S3_RESTIC_URL}"
        bucket: "${CF_S3_RESTIC_BUCKET}-grimmory"
        accessKey: "${CF_S3_RESTIC_ID}"
        secretKey: "${CF_S3_RESTIC_KEY}"
        encrKey: "${CF_S3_RESTIC_KEY}"
      rfs-restic:
        type: s3
        url: "${RUSTFS_S3_RESTIC_URL}"
        bucket: "${RUSTFS_S3_RESTIC_BUCKET}-grimmory"
        accessKey: "${RUSTFS_S3_RESTIC_ID}"
        secretKey: "${RUSTFS_S3_RESTIC_KEY}"
        encrKey: "${RUSTFS_S3_RESTIC_KEY}"
    service:
      main:
        type: ClusterIP
        ports:
          main:
            port: 6060
    workload:
      main:
        podSpec:
          containers:
            main:
              env:
                APP_USER_ID: 568
                APP_GROUP_ID: 568
                # BOOKLORE_PORT: "{{ .Values.service.main.ports.main.port }}"
                DATABASE_URL:
                  secretKeyRef:
                    expandObjectName: false
                    name: '{{ printf "%s-%s" .Release.Name "mariadbcreds" }}'
                    key: jdbc-mariadb
                DATABASE_USERNAME: "{{ .Values.mariadb.mariadbUsername }}"
                DATABASE_PASSWORD: "{{ .Values.mariadb.password }}"
                DISK_TYPE: NETWORK
    ingress:
      main:
        enabled: true
        ingressClassName: "external"
        annotations:
          nginx.ingress.kubernetes.io/custom-http-errors: "599"
          nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
        hosts:
          - host: grimmory.${DOMAIN_2}
            paths:
              - path: /
                pathType: Prefix
        integrations:
          nginx:
            enabled: true
            auth:
              type: "authelia"
              internalHost: "authelia.authelia.svc.cluster.local:9091"
              externalHost: "auth.${DOMAIN_2}"
          homepage:
            enabled: false
          certManager:
            enabled: true
            certificateIssuer: general-le-prod
    persistence:
      data:
        enabled: true
        mountPath: "/app/data"
        volsync:
          - name: data
            type: restic
            credentials: cf-restic
            dest:
              enabled: true
            src:
              enabled: true
      media:
        enabled: true
        type: nfs
        server: ${SCALE_IP}
        path: ${MEDIA_NFS}
        mountPath: "/books"
      bookdrop:
        enabled: true
        type: nfs
        server: ${SCALE_IP}
        path: "${MEDIA_NFS}/Literature/imports"
        mountPath: "/bookdrop"

    mariadb:
      enabled: true
      mariadbUsername: grimmory
      mariadbDatabase: grimmory
      backups:
        enabled: true
        credentials: cf-restic
        retentionPolicy: "7d"
        scheduledBackups:
          - name: daily-backup
            # https://crontab.guru/#10_0_*_*_*
            schedule: "10 0 * * *"
            backupOwnerReference: self
            immediate: true
            suspend: false
