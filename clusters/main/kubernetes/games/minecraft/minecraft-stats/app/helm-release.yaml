---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: minecraft-stats
  namespace: minecraft
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 15.36.3
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 30m
  timeout: 20m
  maxHistory: 3
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    gatus:
      group: games-minecraft
    global:
      stopAll: false
    image:
      repository: ghcr.io/xstar97/mc-stats
      pullPolicy: IfNotPresent
      tag: 3.3.1@sha256:c28c1bed1cb26762a1fbdab8ffc43512128c01f3b9342b569ef950ca60161b5d
    credentials:
      cf-restic:
        type: s3
        url: "${CF_S3_RESTIC_URL}"
        bucket: "${CF_S3_RESTIC_BUCKET}-minecraft-stats"
        accessKey: "${CF_S3_RESTIC_ID}"
        secretKey: "${CF_S3_RESTIC_KEY}"
        encrKey: "${CF_S3_RESTIC_KEY}"

    securityContext:
      container:
        readOnlyRootFilesystem: false
        # runAsGroup: 0
        # runAsUser: 0

    service:
      main:
        ports:
          main:
            port: 8080
    ingress:
      main:
        enabled: true
        ingressClassName: "external"
        hosts:
          - host: statsmc.${DOMAIN_1}
            paths:
              - path: /
                pathType: Prefix
        integrations:
          nginx:
            enabled: true
          certManager:
            enabled: true
            certificateIssuer: general-le-prod

    mcstats:
      creative:
        server:
          sources:
            - path: /data/creative
              worldName: world
        data:
          documentRoot: /config/creative/public
          eventsDir: /config/creative/events
          statsDir: /config/creative/stats
        crown:
          silver: 2
          gold: 4
          bronze: 1
        client:
          defaultLanguage: en
          playersPerPage: 100
          playerCacheUUIDPrefix: 2
          serverName: null
          showLastOnline: true
        players:
          inactiveDays: 7
          updateInactive: false
          profileUpdateInterval: 3
          minPlaytime: 60
          excludeBanned: true
          excludeOps: false
          excludeUUIDs: []

    workload:
      main:
        podSpec:
          initContainers:
            update-config:
              enabled: true
              type: init
              imageSelector: "image"
              command:
                - /bin/sh
                - -c
              args:
                - |
                  set -e
                  {{- range $name, $cfg := $.Values.mcstats }}
                  
                  # Create instance dirs
                  mkdir -p /config/{{ $name }}/
                  
                  # Write config.json
                  cat <<EOF > /config/{{ $name }}/config.json
                  {{ $cfg | toJson }}
                  EOF
                  echo "Created /config/{{ $name }}/config.json"
                  {{- end }}
          containers:
            main:
              env:
                PORT: "{{ .Values.service.main.ports.main.port }}"
                INSTANCES: "creative"
                INTERVAL_SECONDS: 300
                
    persistence:
      config:
        enabled: true
        targetSelector:
          main:
            mcstats:
              mountPath: /config
            update-config:
              mountPath: /config
        volsync:
          - name: config
            type: restic
            credentials: cf-restic
            dest:
              enabled: true
            src:
              enabled: true
      mc-java-creative-data:
        enabled: true
        type: pvc    
        dataSource:
          kind: "PersistentVolumeClaim"
          name: "existingPVC"
        existingClaim: minecraft-creative-minecraft-java-data
        mountPath: /data/creative
        readOnly: true
