---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: yarnl
  namespace: yarnl
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 17.0.6
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 30m
  timeout: 20m
  maxHistory: 3
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    gatus:
      group: assets
    global:
      stopAll: false
    image:
      repository: titandrive/yarnl
      pullPolicy: IfNotPresent
      tag: 0.9.6@sha256:d0f90b4bc7ddac6bdfdf1ceebb569cfce8ec89dea92965376032241f6f2a1df5
    credentials:
      cf-restic:
        type: s3
        url: "${CF_S3_RESTIC_URL}"
        bucket: "${CF_S3_RESTIC_BUCKET}-yarnl"
        accessKey: "${CF_S3_RESTIC_ID}"
        secretKey: "${CF_S3_RESTIC_KEY}"
        encrKey: "${CF_S3_RESTIC_KEY}"
    securityContext:
      container:
        runAsNonRoot: false
        readOnlyRootFilesystem: false
        runAsUser: 0
        runAsGroup: 0
    service:
      main:
        ports:
          main:
            port: 3000
    workload:
      main:
        podSpec:
          containers:
            main:
              env:
                POSTGRES_HOST:
                  secretKeyRef:
                    name: cnpg-main-urls
                    key: host
                POSTGRES_PORT: "5432"
                POSTGRES_DB: "{{ .Values.cnpg.main.database }}"
                POSTGRES_USER: "{{ .Values.cnpg.main.user }}"
                POSTGRES_PASSWORD:
                  secretKeyRef:
                    name: cnpg-main-user
                    key: password
                ADMIN_USERNAME: ${YARNL_ADMIN_USER}
                ADMIN_PASSWORD: ${YARNL_ADMIN_PASS}
    ingress:
      main:
        enabled: true
        ingressClassName: "internal"
        hosts:
          - host: yarnl.${DOMAIN_2}
            paths:
              - path: /
                pathType: Prefix
        integrations:
          nginx:
            enabled: true
          certManager:
            enabled: true
            certificateIssuer: general-le-prod
    persistence:
      users:
        enabled: true
        mountPath: /app/users
        volsync:
          - name: users
            type: restic
            credentials: cf-restic
            dest:
              enabled: true
            src:
              enabled: true
      backups:
        enabled: true
        mountPath: /backups
        volsync:
          - name: backups
            type: restic
            credentials: cf-restic
            dest:
              enabled: true
            src:
              enabled: true
      uploads:
        enabled: true
        type: emptyDir
        mountPath: /app/temp-uploads

    cnpg:
      main:
        enabled: true
        user: yarnl
        database: yarnl
        # mode: recovery
        cluster:
          singleNode: true
          walStorage:
            size: 10Gi
        backups:
          enabled: true
          credentials: cf-restic
          retentionPolicy: "7d"
          scheduledBackups:
            - name: daily-backup
              # https://crontab.guru/#0_8_*_*_*
              schedule: "0 8 * * *"
              backupOwnerReference: self
              immediate: true
              suspend: false
        recovery:
          method: object_store
          credentials: cf-restic