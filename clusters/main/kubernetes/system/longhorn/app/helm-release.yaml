apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  interval: 5m
  releaseName: longhorn
  chart:
    spec:
      chart: longhorn
      version: 1.11.2
      sourceRef:
        kind: HelmRepository
        name: home-ops-mirror
        namespace: flux-system
  install:
    createNamespace: true
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    gatus:
      group: core
    persistence:
      defaultClass: true
      defaultClassReplicaCount: 1
      reclaimPolicy: Delete
      defaultDataLocality: disabled
    defaultSettings:
      # Replica behavior
      defaultReplicaCount: '{"v1":"1","v2":"1"}'
      replicaAutoBalance: best-effort
      replicaSoftAntiAffinity: false
      replicaZoneSoftAntiAffinity: true
      replicaDiskSoftAntiAffinity: true
      # Self-healing
      autoSalvage: true
      autoDeletePodWhenVolumeDetachedUnexpectedly: true
      # Snapshot cleanup
      autoCleanupSystemGeneratedSnapshot: true
      autoCleanupRecurringJobBackupSnapshot: true
      snapshotMaxCount: 250
      # Orphan cleanup
      orphanResourceAutoDeletion: "replica-data;instance"
      orphanResourceAutoDeletionGracePeriod: 300
      # Disk protection
      storageMinimalAvailablePercentage: 25
      storageReservedPercentageForDefaultDisk: 10
      storageOverProvisioningPercentage: "100000"
      # Rebuild / IO protection
      concurrentReplicaRebuildPerNodeLimit: 2
      rebuildConcurrentSyncLimit: 2
      # Node handling
      disableSchedulingOnCordonedNode: true
      nodeDrainPolicy: block-if-contains-last-replica
      nodeDownPodDeletionPolicy: delete-both-statefulset-and-deployment-pod
      # Logging
      logLevel: Info
      # Backup
      backupCompressionMethod: lz4
      backupConcurrentLimit: 2
      restoreConcurrentLimit: 2
    csi:
      attacherReplicaCount: 1
      provisionerReplicaCount: 1
      resizerReplicaCount: 1
      snapshotterReplicaCount: 1
    longhornUI:
      replicas: 1
    metrics:
      serviceMonitor:
        enabled: true
