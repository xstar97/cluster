---
    # yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
    name: "Tests"
    
    on:
      pull_request:
        branches: ["main"]
        paths: ["clusters/main/kubernetes/**"]
    
    concurrency:
      group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
      cancel-in-progress: true
    env:
      KUBERNETES_DIR: ./clusters/main/kubernetes
      KUBECONFORM_SCRIPT: .github/workflows/scripts/kubeconform.sh
    
    jobs:
      kubeconform:
        name: Kubeconform
        runs-on: ubuntu-latest
        steps:
          - name: Checkout
            uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
    
          - name: Setup Homebrew
            uses: Homebrew/actions/setup-homebrew@98cfa07b984a61682e6cd3a0833fad2006cc84ba # master
    
          - name: Setup Workflow Tools
            run: brew install fluxcd/tap/flux kubeconform kustomize
    
          - name: Run kubeconform
            shell: bash
            run: bash ${{ env.KUBECONFORM_SCRIPT}}  ${{ env.KUBERNETES_DIR }}
    
      flux-diff:
        name: Flux Diff
        runs-on: ubuntu-latest
        permissions:
          contents: read
          pull-requests: write
        strategy:
          matrix:
            paths: ["clusters/main/kubernetes"]
            resources: ["kustomization"]
        steps:
          - name: Checkout
            uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
            with:
              path: pull
    
          - name: Checkout Default Branch
            uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
            with:
              ref: "${{ github.event.repository.default_branch }}"
              path: default
    
          - name: Diff Resources
            uses: docker://ghcr.io/allenporter/flux-local:main@sha256:11acaf4d632209cb79db40ba334ddcf07c45cd2a675615c5803740625ad553ce
            with:
              args: >-
                diff ${{ matrix.resources }}
                --unified 6
                --path /github/workspace/pull/${{ matrix.paths }}
                --path-orig /github/workspace/default/${{ matrix.paths }}
                --strip-attrs "helm.sh/chart,checksum/config,app.kubernetes.io/version,chart"
                --limit-bytes 10000
                --all-namespaces
                --sources "cluster"
                --output-file diff.patch
    
          - name: Generate Diff
            id: diff
            run: |
              cat diff.patch
              echo "diff<<EOF" >> $GITHUB_OUTPUT
              cat diff.patch >> $GITHUB_OUTPUT
              echo "EOF" >> $GITHUB_OUTPUT
    
          - if: ${{ steps.diff.outputs.diff != '' }}
            name: Add comment
            uses: mshick/add-pr-comment@8e4927817251f1ff60c001f04568532b38e0b4a0 # v3
            with:
              message-id: "${{ github.event.pull_request.number }}/${{ matrix.paths }}/${{ matrix.resources }}"
              message-failure: Diff was not successful
              message: |
                ```diff
                ${{ steps.diff.outputs.diff }}
                ```
      automerge-and-approve:
        needs:
          - kubeconform
          - flux-diff
        name: Automerge and Approve build
        runs-on: ubuntu-latest
        steps:
          - name: automerge
            uses: pascalgn/automerge-action@7961b8b5eec56cc088c140b56d864285eabd3f67 # v0.16.4
            env:
              GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
              UPDATE_RETRIES: 12
              UPDATE_RETRY_SLEEP: 60000
              MERGE_METHOD: squash
